name: road_care
description: A community-driven pothole reporting system powered by Flutter and Firebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Maps
  mapbox_maps_flutter: ^2.3.0

  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Image
  image_picker: ^1.1.2

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  intl: ^0.19.0

  # Utils
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  flutter_dotenv: ^5.2.1
  latlong2: ^0.9.1
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
